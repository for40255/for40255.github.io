  <title>Local Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/p2p-dplayer@latest/dist/DPlayer.min.css" rel="stylesheet">
  <link href="./static/main.css" rel="stylesheet">
  <style>

  </style>
</head>
<body>

<div class="overlay">
  <svg class="play_button" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" >
      <circle cx="50" cy="50" r="48" stroke="white" stroke-width="4" fill="rgba(0,0,0,0.3)"/>
      <path d="M40 35V65L65 50L40 35Z" fill="white"/>
  </svg>
  <svg class="cycle" width="60" height="60" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" stroke="white">
    <g fill="none" fill-rule="evenodd">
      <g transform="translate(1 1)" stroke-width="3">
      <circle stroke-opacity=".3" cx="18" cy="18" r="18"/>
      <path d="M36 18c0-9.94-8.06-18-18-18">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 18 18"
          to="360 18 18"
          dur="0.8s"
          repeatCount="indefinite"/>
      </path>
      </g>
    </g>
  </svg>
</div>

<div class="container">
  <div id="dplayer" playsinline></div>
</div>

<script src="./static/dp_custom.js"></script>
<script>
  window.addEventListener("load", (event) => {
    const dp = new DPlayer({
      container: document.getElementById('dplayer'),
      video: { url: PALY_URL ? PALY_URL : '', type: 'hls'},
      chromecast: true,
      contextmenu: [
        { text: '開啟目前播放連結', click: (player) => { window.open(player.video.src); } },
        { text: '輸入播放連結', click: (player) => { prompt_url(player, true); } },
      ],
      preload: 'none',
      //autoplay: true
    });

    if (dp) {
      dp.template.mobilePlayButton.classList.add('hide');
      addPipButton(dp);
      showPlayButton();

      if (PALY_URL) initDplayer(dp, PALY_URL);
      else {
        dp.template.playButton.style.pointerEvents = 'none'; //阻止DPlay右下播放按鍵
        const handleOverlayClick = () => {
          if (notic(dp)) { 
            alert("讀取成功"); 
            OVERLAY_.removeEventListener('click', handleOverlayClick); 
            dp.template.playButton.style.pointerEvents = '';
          }
        };
        OVERLAY_.addEventListener('click', handleOverlayClick); 
      }
    };
    
  });

</script>

</body>
</html>
